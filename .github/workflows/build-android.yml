name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/joseonhealer.keystore
          keytool -list -keystore android/app/joseonhealer.keystore -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -v 2>&1 | grep "SHA1"

      - name: Sign AAB with jarsigner directly
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
          echo "=== AAB built, now re-signing with correct keystore ==="
          # Remove existing signature
          zip -d app/build/outputs/bundle/release/app-release.aab "META-INF/*" || true
          # Re-sign with EAS keystore
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore app/joseonhealer.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            app/build/outputs/bundle/release/app-release.aab \
            "${{ secrets.KEY_ALIAS }}"
          echo "=== Verify final signature ==="
          keytool -printcert -jarfile app/build/outputs/bundle/release/app-release.aab 2>&1 | grep "SHA1"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-signed
          path: android/app/build/outputs/bundle/release/*.aab
