name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore android/app/joseonhealer.keystore \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias joseonhealer \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD" \
            -dname "CN=JoseonHealer, OU=Mobile, O=JoseonHealer, L=Seoul, ST=Seoul, C=KR"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Build signed AAB
        working-directory: android
        run: chmod +x gradlew && ./gradlew bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Build APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-signed
          path: android/app/build/outputs/bundle/release/*.aab

      - name: Upload APK (debug)
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload Keystore (backup - download immediately!)
        uses: actions/upload-artifact@v4
        with:
          name: keystore-backup
          path: android/app/joseonhealer.keystore
